<style amp-custom>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
    min-height:100%;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    align-items:flex-start;
    padding-top:20px;
    font-family:Arial, sans-serif;
    color:#fff;
    background:url("https://creaturecomfortz.com/x9/images/background-mobile.webp") center/cover no-repeat;
    position:relative;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.container{
    position:relative;
    width:90%;
    max-width:400px;
    padding:18px;
    border-radius:18px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    text-align:center;
    z-index:2;
    overflow:hidden;
}

.container::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:2px;
    background:linear-gradient(45deg,#ff00cc,#00c6ff,#ffd700,#ff00cc);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    animation:borderMove 3s linear infinite;
}

@keyframes borderMove{
    100%{filter:hue-rotate(360deg)}
}

.glass{
    position:relative;
    overflow:hidden;
}

.glass::before,
.glass::after{
    content:"";
    position:absolute;
    top:0;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.8),transparent);
    transform:skewX(-25deg);
}

.glass::before{
    left:-100%;
    animation:glass1 2s infinite;
}

.glass::after{
    right:-100%;
    animation:glass2 2s infinite;
}

@keyframes glass1{
    0%{left:-100%}
    100%{left:150%}
}

@keyframes glass2{
    0%{right:-100%}
    100%{right:150%}
}

.hidden-seo{
    position:absolute;
    left:-9999px;
    top:-9999px;
    opacity:0;
}

.logo{margin-bottom:8px}

.banner{

h1{
